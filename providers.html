<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Youth Skilled - Providers</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
<style>
:root {
    --bg-dark: #0f2027;
    --bg-dark2: #203a43;
    --bg-dark3: #2c5364;
    --primary: linear-gradient(90deg, #00f5ff, #00ff88);
}
* { box-sizing: border-box; }
body { margin: 0; font-family: 'Poppins', sans-serif; background: linear-gradient(135deg, var(--bg-dark), var(--bg-dark2), var(--bg-dark3)); color: white; overflow-x: hidden; }
nav { display: flex; justify-content: space-between; align-items: center; padding: 20px 8%; position: fixed; width: 100%; backdrop-filter: blur(10px); background: rgba(255,255,255,0.05); border-bottom: 1px solid rgba(255,255,255,0.1); z-index: 1000; }
.logo { font-size: 22px; font-weight: 700; background: var(--primary); -webkit-background-clip: text; color: transparent; }
.nav-links { display: flex; gap: 25px; }
.nav-links a { text-decoration: none; color: white; font-weight: 500; white-space: nowrap; }
.nav-links a:hover { transform: translateY(-3px); color: #00ff88; text-shadow: 0 0 10px #00ff88, 0 0 15px #00f5ff; }
.hero { height: 30vh; display: flex; justify-content: center; align-items: center; text-align: center; padding: 0 10%; padding-top: 80px; }
.hero h1 { font-size: 32px; background: var(--primary); -webkit-background-clip: text; color: transparent; }
.hero p { margin-top: 10px; font-size: 16px; opacity: 0.85; }
#filters { padding: 20px 10%; text-align: center; }
#filters input, #filters select { padding: 10px 15px; border-radius: 10px; border: none; font-family: 'Poppins', sans-serif; margin: 5px; }
#filters input:focus, #filters select:focus { outline: none; box-shadow: 0 0 10px #00f5ff; }
.cards { display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 20px; padding: 0 10%; margin-bottom: 60px; }
.card { padding: 20px; border-radius: 15px; background: rgba(255,255,255,0.05); backdrop-filter: blur(10px); border: 1px solid rgba(255,255,255,0.1); position: relative; }
.card h3 { margin-bottom: 5px; }
.card p { font-size: 14px; margin: 3px 0; }
.verified { position: absolute; top: 15px; right: 15px; background: #00ff88; color: black; font-weight: 700; font-size: 12px; padding: 3px 8px; border-radius: 12px; }
.rating { display: flex; gap: 3px; margin-top: 5px; }
.star { color: gold; font-size: 16px; }
.btn-book { margin-top: 10px; padding: 8px 18px; border: none; border-radius: 20px; background: #00ff88; color: black; font-weight: 600; cursor: pointer; }
.modal { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); display: flex; justify-content: center; align-items: center; opacity: 0; pointer-events: none; transition: 0.3s; z-index: 2000; }
.modal.active { opacity: 1; pointer-events: auto; }
.modal-content { background: var(--bg-dark2); padding: 30px; border-radius: 20px; width: 90%; max-width: 400px; text-align: center; position: relative; }
.modal-content input[type="date"] { padding: 10px; border-radius: 10px; border: none; margin-bottom: 20px; width: 100%; }
.close-modal { position: absolute; top: 15px; right: 15px; font-size: 20px; cursor: pointer; }
footer { text-align: center; padding: 40px 10%; background: rgba(0,0,0,0.3); border-top: 1px solid rgba(255,255,255,0.1); }
footer .footer-content { display: flex; flex-direction: column; align-items: center; gap: 10px; }
footer .social-icons { display: flex; gap: 20px; }
footer .social-icons a { color: white; font-size: 20px; transition: all 0.3s ease; }
footer .social-icons a:hover { color: #00ff88; transform: translateY(-3px); text-shadow: 0 0 10px #00ff88, 0 0 15px #00f5ff; }
@media (max-width: 768px) { .cards { grid-template-columns: 1fr; } .hero h1 { font-size: 28px; } }
</style>
</head>
<body>

<nav>
    <div class="logo">Youth Skilled</div>
    <div class="nav-links">
        <a href="index.html">Home</a>
        <a href="skills.html">Skills</a>
        <a href="#contact">Contact</a>
    </div>
</nav>

<div class="hero">
    <div>
        <h1 id="skill-title">Skill Providers</h1>
        <p>Book certified service providers easily.</p>
    </div>
</div>

<section id="filters">
    <input type="text" id="search-name" placeholder="Search by provider name">
    <select id="location-filter">
        <option value="">All Locations</option>
        <option value="Lusaka">Lusaka</option>
        <option value="Ndola">Ndola</option>
        <option value="Kitwe">Kitwe</option>
    </select>
    <select id="verified-filter">
        <option value="">All</option>
        <option value="true">YS Verified Only</option>
    </select>
</section>

<section id="providers-section">
    <div class="cards" id="providers-cards"></div>
</section>

<div class="modal" id="booking-modal">
    <div class="modal-content">
        <span class="close-modal" id="close-modal">&times;</span>
        <h2>Book Service</h2>
        <input type="date" id="booking-date">
        <button class="btn" id="confirm-booking">Request Booking</button>
        <p id="booking-msg" style="margin-top:15px;opacity:0.9;"></p>
    </div>
</div>

<footer id="contact">
    <div class="footer-content">
        © 2026 Youth Skilled. All Rights Reserved.
        <div class="social-icons">
            <a href="https://facebook.com" target="_blank"><i class="fab fa-facebook-f"></i></a>
            <a href="https://twitter.com" target="_blank"><i class="fab fa-twitter"></i></a>
            <a href="https://linkedin.com" target="_blank"><i class="fab fa-linkedin-in"></i></a>
        </div>
    </div>
</footer>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
const supabaseUrl = "https://fwvuvfiqaxmtpyxmwiih.supabase.co";
const supabaseKey = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImZ3dnV2ZmlxYXhtdHB5eG13aWloIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzMzMTMwOTMsImV4cCI6MjA4ODg4OTA5M30.jYOdMzA2UL6ifNUMhleJq6yfL4CNTehkR-dDjnMwf0Y"; // replace
const supabase = supabase.createClient(supabaseUrl, supabaseKey);

const urlParams = new URLSearchParams(window.location.search);
const skill = urlParams.get('skill') || "Skill Providers";
document.getElementById('skill-title').innerText = skill;

const modal = document.getElementById("booking-modal");
let currentBooking = null;
document.getElementById("close-modal").addEventListener("click", () => modal.classList.remove("active"));
document.getElementById("confirm-booking").addEventListener("click", () => {
    const date = document.getElementById("booking-date").value;
    if(date){
        document.getElementById("booking-msg").innerText = `You have requested a booking for ${currentBooking} on ${date}. Awaiting provider confirmation.`;
    } else {
        document.getElementById("booking-msg").innerText = "Please select a date.";
    }
});

let providersData = [];

async function fetchProviders() {
    // Fetch only users with show_in_directory = true (either self-listed or dashboard toggle)
    const { data, error } = await supabase
        .from('providers')
        .select('*')
        .eq('show_in_directory', true)
        .eq('skill', skill);
    if(error) console.error("Error fetching providers:", error);
    return data || [];
}

function renderProviders() {
    const container = document.getElementById('providers-cards');
    container.innerHTML = "";
    const searchName = document.getElementById("search-name").value.toLowerCase();
    const locationFilter = document.getElementById("location-filter").value;
    const verifiedFilter = document.getElementById("verified-filter").value;

    providersData
        .filter(p => 
            p.name.toLowerCase().includes(searchName) &&
            (locationFilter === "" || p.location === locationFilter) &&
            (verifiedFilter === "" || p.verified === (verifiedFilter === "true"))
        )
        .forEach(p => {
            const card = document.createElement("div");
            card.classList.add("card");
            card.innerHTML = `
                ${p.verified ? '<div class="verified">YS Verified</div>' : ''}
                <h3>${p.name}</h3>
                <p>Gender: ${p.gender || '-'}</p>
                <p>Age: ${p.age || '-'}</p>
                <p>Location: ${p.location || '-'}</p>
                <p>Experience: ${p.experience || '-'}</p>
                <div class="rating">${'★'.repeat(p.rating || 0)}${'☆'.repeat(5 - (p.rating || 0))}</div>
                <button class="btn-book">Book</button>
            `;
            container.appendChild(card);
            card.querySelector(".btn-book").addEventListener("click", () => {
                currentBooking = p.name;
                modal.classList.add("active");
                document.getElementById("booking-msg").innerText = "";
            });
        });
}

async function loadProviders() {
    providersData = await fetchProviders();
    renderProviders();
}

document.getElementById("search-name").addEventListener("input", renderProviders);
document.getElementById("location-filter").addEventListener("change", renderProviders);
document.getElementById("verified-filter").addEventListener("change", renderProviders);

// Real-time updates for any provider insert or update
supabase
  .from('providers')
  .on('INSERT', payload => {
      if(payload.new.show_in_directory && payload.new.skill === skill){
          providersData.push(payload.new);
          renderProviders();
      }
  })
  .on('UPDATE', payload => {
      const index = providersData.findIndex(p => p.id === payload.new.id);
      if(payload.new.show_in_directory && payload.new.skill === skill){
          if(index === -1) providersData.push(payload.new);
          else providersData[index] = payload.new;
      } else if(index !== -1){
          providersData.splice(index, 1);
      }
      renderProviders();
  })
  .subscribe();

loadProviders();
</script>
</body>
</html>
