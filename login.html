<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Youth Skilled - Login</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
<style>
:root{
--bg-dark:#0f2027;
--primary:linear-gradient(90deg,#00f5ff,#00ff88);
--accent:#00ff88;
}
body{
margin:0;
font-family:'Poppins',sans-serif;
background:var(--bg-dark);
color:white;
display:flex;
justify-content:center;
align-items:center;
min-height:100vh;
}
.container{
background:rgba(255,255,255,0.05);
backdrop-filter:blur(15px);
border-radius:25px;
padding:50px 40px;
max-width:400px;
width:100%;
text-align:center;
box-shadow:0 15px 40px rgba(0,0,0,0.5);
}
.container h2{
background:var(--primary);
-webkit-background-clip:text;
color:transparent;
margin-bottom:30px;
}
.input-field{
width:100%;
padding:15px 20px;
margin:10px 0;
border-radius:30px;
border:none;
outline:none;
font-size:16px;
}
.btn{
width:100%;
padding:15px 0;
border:none;
border-radius:30px;
background:var(--primary);
color:black;
font-weight:600;
font-size:16px;
cursor:pointer;
}
.error{
color:#ff4d4d;
margin-top:10px;
}
.toggle{
margin-top:15px;
}
.toggle a{
color:var(--accent);
text-decoration:none;
}
</style>
</head>
<body>

<div class="container">
<h2>Login to Youth Skilled</h2>

<form id="loginForm">
<input type="email" id="loginEmail" class="input-field" placeholder="Email" required>
<input type="password" id="loginPassword" class="input-field" placeholder="Password" required>
<button type="submit" class="btn">Login</button>
<div id="loginError" class="error"></div>
<div class="toggle">
Don't have an account? <a href="signup.html">Sign Up</a>
</div>
</form>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
const supabaseUrl = "https://fwvuvfiqaxmtpyxmwiih.supabase.co";
const supabaseAnonKey = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImZ3dnV2ZmlxYXhtdHB5eG13aWloIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzMzMTMwOTMsImV4cCI6MjA4ODg4OTA5M30.jYOdMzA2UL6ifNUMhleJq6yfL4CNTehkR-dDjnMwf0Y"; // replace with anon key
const supabaseClient = window.supabase.createClient(supabaseUrl, supabaseAnonKey);

// show/hide password
document.getElementById("loginShowPass").addEventListener("change", e => {
    document.getElementById("loginPassword").type = e.target.checked ? "text" : "password";
});

// redirect if already logged in
(async () => {
    const { data: { session } } = await supabaseClient.auth.getSession();
    if(session) window.location.href='dashboard.html';
})();

// login form
document.getElementById("loginForm").addEventListener("submit", async e => {
    e.preventDefault();
    const email = document.getElementById("loginEmail").value.trim();
    const password = document.getElementById("loginPassword").value;

    try {
        const { data, error } = await supabaseClient.auth.signInWithPassword({ email, password });
        if(error) throw error;
        window.location.href="dashboard.html";
    } catch(err) {
        document.getElementById("loginError").textContent = err.message;
    }
});
</script>

</body>
</html>
