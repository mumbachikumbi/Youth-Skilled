<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Youth Skilled - Sign Up</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
<style>
:root{
--bg-dark:#0f2027;
--primary:linear-gradient(90deg,#00f5ff,#00ff88);
--accent:#00ff88;
}
body{
margin:0;
font-family:'Poppins',sans-serif;
background:var(--bg-dark);
color:white;
display:flex;
justify-content:center;
align-items:center;
min-height:100vh;
}
.container{
background:rgba(255,255,255,0.05);
backdrop-filter:blur(15px);
border-radius:25px;
padding:50px 40px;
max-width:400px;
width:100%;
text-align:center;
box-shadow:0 15px 40px rgba(0,0,0,0.5);
}
.container h2{
background:var(--primary);
-webkit-background-clip:text;
color:transparent;
margin-bottom:30px;
}
.input-field{
width:100%;
padding:15px 20px;
margin:10px 0;
border-radius:30px;
border:none;
outline:none;
font-size:16px;
}
.show-password{
display:flex;
align-items:center;
font-size:14px;
margin-bottom:10px;
}
.btn{
width:100%;
padding:15px 0;
border:none;
border-radius:30px;
background:var(--primary);
color:black;
font-weight:600;
font-size:16px;
cursor:pointer;
}
.error{
color:#ff4d4d;
margin-top:10px;
}
.toggle{
margin-top:15px;
}
.toggle a{
color:var(--accent);
text-decoration:none;
}
</style>
</head>

<body>

<div class="container">

<h2>Create Your Account</h2>

<form id="signupForm">

<input type="text" id="signupName" class="input-field" placeholder="Full Name" required>
<input type="email" id="signupEmail" class="input-field" placeholder="Email" required>
<input type="password" id="signupPassword" class="input-field" placeholder="Password" required>

<label class="show-password">
<input type="checkbox" id="signupShowPass"> Show Password
</label>

<button type="submit" class="btn">Sign Up</button>

<div id="signupError" class="error"></div>

<div class="toggle">
Already have an account? <a href="login.html">Login</a>
</div>

</form>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
// Supabase config
const supabaseUrl = "https://fwvuvfiqaxmtpyxmwiih.supabase.co";
const supabaseAnonKey = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImZ3dnV2ZmlxYXhtdHB5eG13aWloIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzMzMTMwOTMsImV4cCI6MjA4ODg4OTA5M30.jYOdMzA2UL6ifNUMhleJq6yfL4CNTehkR-dDjnMwf0Y"; // replace with your anon key
const supabaseClient = window.supabase.createClient(supabaseUrl, supabaseAnonKey);

// show/hide password
document.getElementById("signupShowPass").addEventListener("change", e => {
    document.getElementById("signupPassword").type = e.target.checked ? "text" : "password";
});

// redirect if already logged in
(async () => {
    const { data: { session } } = await supabaseClient.auth.getSession();
    if(session) window.location.href='dashboard.html';
})();

// signup form
document.getElementById("signupForm").addEventListener("submit", async e => {
    e.preventDefault();
    const name = document.getElementById("signupName").value.trim();
    const email = document.getElementById("signupEmail").value.trim();
    const password = document.getElementById("signupPassword").value;

    document.getElementById("signupError").textContent = "";

    try {
        // create user
        const { data, error } = await supabaseClient.auth.signUp({ email, password });
        console.log("Signup result:", data, error);
        if(error) throw error;
        if(!data.user) throw new Error("User was not created.");

        // insert profile automatically (RLS must allow this)
        const { error: profileError } = await supabaseClient
            .from("profiles")
            .insert([{ id: data.user.id, name, email, avatar_url: "", bio: "", ys_badge: false }]);

        if(profileError) console.warn("Profile insert may be delayed until user confirms email:", profileError.message);

        alert("Signup successful! Check your email to confirm your account.");
        window.location.href="login.html";

    } catch(err) {
        console.error(err);
        document.getElementById("signupError").textContent = err.message;
    }
});
</script>

</body>
</html>
