<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Self-Listing - Youth Skilled</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <style>
        :root{
            --bg-dark:#0f2027;
            --bg-dark2:#203a43;
            --bg-dark3:#2c5364;
            --primary:linear-gradient(90deg,#00f5ff,#00ff88);
            --highlight-color:#00ff88;
            --subtle-bg:#354d61;
        }
        * {box-sizing: border-box;}
        body {
            margin: 0;
            font-family: 'Poppins', sans-serif;
            background: linear-gradient(135deg, var(--bg-dark), var(--bg-dark2), var(--bg-dark3));
            color: white;
            overflow-x: hidden;
        }

        /* NAVBAR */
        nav {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px 8%;
            position: fixed;
            width: 100%;
            backdrop-filter: blur(10px);
            background: rgba(255, 255, 255, 0.05);
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
            z-index: 1000;
        }
        .logo {
            font-size: 22px;
            font-weight: 700;
            background: var(--primary);
            -webkit-background-clip: text;
            color: transparent;
        }
        .nav-links {
            display: flex;
            gap: 25px;
        }
        .nav-links a {
            text-decoration: none;
            color: white;
            font-weight: 500;
            white-space: nowrap;
        }
        .nav-links a:hover {
            transform: translateY(-3px);
            color: var(--highlight-color);
            text-shadow: 0 0 10px var(--highlight-color), 0 0 15px #00f5ff;
        }

        /* HERO */
        .hero {
            height: 30vh;
            display: flex;
            justify-content: center;
            align-items: center;
            text-align: center;
            padding: 0 10%;
            padding-top: 80px; /* offset navbar */
        }
        .hero h1 {
            font-size: 32px;
            background: var(--primary);
            -webkit-background-clip: text;
            color: transparent;
        }
        .hero p {
            margin-top: 10px;
            font-size: 16px;
            opacity: 0.85;
        }

        /* FORM SECTION */
        .form-container {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
            padding: 40px;
            border-radius: 15px;
            margin-top: 30px;
            width: 70%;
            max-width: 600px;
            margin: 0 auto;
        }
        .form-container input,
        .form-container select,
        .form-container textarea {
            width: 100%;
            padding: 12px;
            margin-bottom: 20px;
            border-radius: 10px;
            border: none;
            background: rgba(255, 255, 255, 0.1);
            color: white;
            font-size: 16px;
            font-family: 'Poppins', sans-serif;
        }
        .form-container input:focus,
        .form-container select:focus,
        .form-container textarea:focus {
            outline: none;
            box-shadow: 0 0 10px #00f5ff;
        }

        .form-container label {
            font-weight: 600;
            margin-bottom: 8px;
            display: block;
        }

        .form-container button {
            background: var(--highlight-color);
            color: black;
            font-weight: 600;
            padding: 12px 30px;
            border: none;
            border-radius: 20px;
            cursor: pointer;
            transition: background 0.3s ease;
            width: 100%;
        }
        .form-container button:hover {
            background: #00e1c6;
        }

        /* FOOTER */
        footer {
            text-align: center;
            padding: 40px 10%;
            background: rgba(0, 0, 0, 0.3);
            border-top: 1px solid rgba(255, 255, 255, 0.1);
        }
        footer .footer-content {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 10px;
        }
        footer .social-icons {
            display: flex;
            gap: 20px;
        }
        footer .social-icons a {
            color: white;
            font-size: 20px;
            transition: all 0.3s ease;
        }
        footer .social-icons a:hover {
            color: var(--highlight-color);
            transform: translateY(-3px);
            text-shadow: 0 0 10px var(--highlight-color), 0 0 15px #00f5ff;
        }
    </style>
</head>
<body>

<nav>
    <div class="logo">Youth Skilled</div>
    <div class="nav-links">
        <a href="index.html">Home</a>
        <a href="skills.html">Skills</a>
        <a href="#contact">Contact</a>
    </div>
</nav>

<div class="hero">
    <div>
        <h1>List Your Service</h1>
        <p>If you're not a course graduate but want to showcase your skills, this is the place for you!</p>
    </div>
</div>

<!-- FORM SECTION -->
<div class="form-container">
    <h2>Service Listing Form</h2>
    <form id="self-listing-form">
        <!-- Service Title -->
        <label for="service-title">Service Title</label>
        <input type="text" id="service-title" name="service-title" placeholder="Enter your service name" required>

        <!-- Service Description -->
        <label for="service-description">Service Description</label>
        <textarea id="service-description" name="service-description" placeholder="Provide a brief description of your service" required></textarea>

        <!-- Skill Category -->
        <label for="category">Skill Category</label>
        <select id="category" name="category" required>
            <option value="Graphic Design">Graphic Design</option>
            <option value="CV Writing">CV Writing</option>
            <option value="Plumbing">Plumbing</option>
            <option value="Solar Installation">Solar Installation</option>
            <option value="Virtual Assistance">Virtual Assistance</option>
            <option value="House Painting">House Painting</option>
            <option value="Social Media Management">Social Media Management</option>
            <option value="Data Entry">Data Entry</option>
            <option value="Electrical Work">Electrical Work</option>
            <option value="Carpentry">Carpentry</option>
            <option value="Green Solutions">Green Solutions</option>
            <option value="Baking">Baking</option>
            <option value="Salon Services">Salon Services</option>
            <option value="Tailoring">Tailoring</option>
            <option value="Tutoring">Tutoring</option>
        </select>

        <!-- Location -->
        <label for="location">Location</label>
        <input type="text" id="location" name="location" placeholder="Where are you located?" required>

        <!-- Contact -->
        <label for="contact">Contact (Email/Phone)</label>
        <input type="text" id="contact" name="contact" placeholder="Enter your contact information" required>

        <!-- Upload Images -->
        <label for="service-images">Upload Images (optional)</label>
        <input type="file" id="service-images" name="service-images" accept="image/*" multiple>

        <!-- Submit Button -->
        <button type="submit">Submit Listing</button>
    </form>
</div>

<footer id="contact">
  <div class="footer-content">
    © 2026 Youth Skilled. All Rights Reserved.
    <div class="social-icons">
      <a href="https://facebook.com" target="_blank"><i class="fab fa-facebook-f"></i></a>
      <a href="https://twitter.com" target="_blank"><i class="fab fa-twitter"></i></a>
      <a href="https://linkedin.com" target="_blank"><i class="fab fa-linkedin-in"></i></a>
    </div>
  </div>
</footer>

<script>
    document.getElementById('self-listing-form').addEventListener('submit', function(e) {
        e.preventDefault();
        
        // For now, we'll just log the form data in the console
        const formData = new FormData(this);
        for (let entry of formData.entries()) {
            console.log(entry[0], entry[1]);
        }

        // Clear the form after submission
        this.reset();

        // Display success message (could be improved with a modal)
        alert("Your service listing has been submitted successfully!");
    });
</script>

</body>
</html>
