<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Youth Skilled - Student Dashboard</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
<style>
:root {
    --bg-dark: #0f2027;
    --bg-dark2: #203a43;
    --primary: linear-gradient(90deg, #00f5ff, #00ff88);
    --accent: #00ff88;
    --card-bg: rgba(255, 255, 255, 0.05);
    --card-bg-hover: rgba(255, 255, 255, 0.1);
}
* { box-sizing: border-box; }
body { margin:0; font-family: 'Poppins', sans-serif; background: var(--bg-dark); color: white; }
nav { display: flex; justify-content: space-between; align-items: center; padding: 20px 5%; position: fixed; width: 100%; backdrop-filter: blur(10px); background: rgba(255,255,255,0.05); border-bottom: 1px solid rgba(255,255,255,0.1); z-index: 1000; }
.logo { font-size: 22px; font-weight: 700; background: var(--primary); -webkit-background-clip: text; color: transparent; }
.nav-links { display: flex; gap: 25px; flex-wrap: wrap; }
.nav-links a { text-decoration: none; color: white; font-weight: 500; white-space: nowrap; position: relative; transition: 0.3s; }
.nav-links a:hover { transform: translateY(-2px); text-shadow: 0 0 10px #00ff88, 0 0 15px #00f5ff; }
.dashboard-container { display: flex; padding-top: 80px; min-height: 100vh; }
.sidebar { width: 250px; background: rgba(0,0,0,0.25); backdrop-filter: blur(10px); padding:30px 20px; display: flex; flex-direction: column; gap:20px; }
.sidebar a { color:white; text-decoration:none; font-weight:500; padding:10px; border-radius:10px; transition:0.3s; }
.sidebar a:hover { background: var(--accent); color:black; transform: translateX(5px); text-shadow: 0 0 5px #00f5ff; }
.main { flex:1; padding:40px; display:flex; flex-direction:column; gap:50px; }
.welcome { font-size:28px; background: var(--primary); -webkit-background-clip:text; color:transparent; margin-bottom:20px; }
.summary { display:flex; gap:20px; flex-wrap:wrap; }
.summary-card { flex:1; min-width:200px; background: var(--card-bg); backdrop-filter: blur(10px); border-radius:20px; padding:25px; text-align:center; box-shadow:0 10px 30px rgba(0,0,0,0.3); transition:0.4s; }
.summary-card:hover { transform: translateY(-5px); background: var(--card-bg-hover); }
.summary-card h3 { font-size:28px; margin-bottom:10px; background: var(--primary); -webkit-background-clip:text; color:transparent; }
.summary-card p { opacity:0.8; }
.toggle-container { display:flex; justify-content:space-between; align-items:center; margin-top:30px; padding:10px; background: var(--card-bg); border-radius:15px; }
.toggle-container label { font-size:18px; color:white; }
.toggle-container .switch { position: relative; display: inline-block; width:60px; height:34px; }
.toggle-container .switch input { opacity:0; width:0; height:0; }
.toggle-container .slider { position:absolute; cursor:pointer; top:0; left:0; right:0; bottom:0; background-color:#ccc; transition:0.4s; border-radius:50px; }
.toggle-container .slider:before { position:absolute; content:""; height:26px; width:26px; border-radius:50px; left:4px; bottom:4px; background-color:white; transition:0.4s; }
.toggle-container input:checked + .slider { background-color: var(--accent); }
.toggle-container input:checked + .slider:before { transform: translateX(26px); }
.courses { display:grid; grid-template-columns: repeat(auto-fit, minmax(250px,1fr)); gap:25px; }
.course-card { background: var(--card-bg); backdrop-filter: blur(10px); border-radius:20px; padding:20px; transition:0.4s; }
.course-card:hover { transform:translateY(-5px) scale(1.02); background: var(--card-bg-hover); box-shadow:0 0 20px #00ff88; }
.course-card h4 { margin-bottom:10px; font-size:22px; background: var(--primary); -webkit-background-clip:text; color:transparent; }
.course-card .progress-bar { height:10px; width:100%; background: rgba(255,255,255,0.2); border-radius:10px; margin-top:10px; overflow:hidden; }
.course-card .progress { height:100%; width:0; background: var(--accent); border-radius:10px; transition:1s; }
.certificates { display:grid; grid-template-columns: repeat(auto-fit, minmax(200px,1fr)); gap:25px; }
.cert-card { background: var(--card-bg); backdrop-filter: blur(10px); border-radius:20px; padding:20px; text-align:center; transition:0.4s; }
.cert-card:hover { transform: translateY(-5px) scale(1.02); background: var(--card-bg-hover); box-shadow: 0 0 20px #00f5ff; }
.cert-card h4 { font-size:20px; margin-bottom:10px; background: var(--primary); -webkit-background-clip:text; color:transparent; }
.main h2 { font-size:26px; margin-bottom:20px; border-bottom:1px solid rgba(0,255,136,0.5); padding-bottom:5px; }
@media(max-width:768px){ .dashboard-container{flex-direction:column;} .sidebar{width:100%;flex-direction:row;overflow-x:auto;padding:10px;} .sidebar a{flex:1;text-align:center;} .summary{flex-direction:column;} .nav-links{gap:15px;font-size:14px;} }
</style>
</head>
<body>

<nav>
    <div class="logo">Youth Skilled</div>
    <div class="nav-links">
        <a href="#">Home</a>
        <a href="#">Dashboard</a>
        <a href="profile.html">Profile</a>
        <a href="#" id="logoutBtn">Logout</a>
    </div>
</nav>

<div class="dashboard-container">
    <div class="sidebar">
        <a href="#">Dashboard</a>
        <a href="courses.html">Courses</a>
        <a href="certificates.html">Certificates</a>
        <a href="profile.html">Profile</a>
        <a href="#" id="logoutSidebar">Logout</a>
    </div>
    <div class="main">
        <div class="welcome">Welcome!</div>

        <!-- Summary Cards -->
        <div class="summary">
            <div class="summary-card"><h3 class="stat" data-target="5">0</h3><p>Courses Enrolled</p></div>
            <div class="summary-card"><h3 class="stat" data-target="72">0</h3><p>Overall Progress</p></div>
            <div class="summary-card"><h3 class="stat" data-target="3">0</h3><p>Certificates Earned</p></div>
        </div>

        <!-- Toggle Service Provider -->
        <div class="toggle-container">
            <label for="service-provider-toggle">Showcase as Service Provider</label>
            <label class="switch">
                <input type="checkbox" id="service-provider-toggle">
                <span class="slider"></span>
            </label>
        </div>

        <!-- Courses -->
        <h2>My Courses</h2>
        <div class="courses" id="courses-list">
            <!-- course cards populated dynamically if needed -->
        </div>

        <!-- Certificates -->
        <h2>My Certificates</h2>
        <div class="certificates" id="certificates-list">
            <!-- certificate cards populated dynamically if needed -->
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js/dist/supabase.min.js"></script>
<script>
const supabaseUrl = "https://fwvuvfiqaxmtpyxmwiih.supabase.co";
const supabaseAnonKey = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImZ3dnV2ZmlxYXhtdHB5eG13aWloIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzMzMTMwOTMsImV4cCI6MjA4ODg4OTA5M30.jYOdMzA2UL6ifNUMhleJq6yfL4CNTehkR-dDjnMwf0Y";
const supabase = supabase.createClient(supabaseUrl, supabaseAnonKey);

async function loadDashboard(){
    const { data: { session } } = await supabase.auth.getSession();
    if(!session){
        window.location.href="login.html";
        return;
    }
    const userId = session.user.id;

    // Load profile
    const { data: profile } = await supabase.from("profiles").select("*").eq("id", userId).single();
    if(profile && profile.name){
        document.querySelector(".welcome").textContent = `Hi, ${profile.name}!`;
        document.getElementById("service-provider-toggle").checked = profile.show_in_directory || false;
    }

    // Summary animation
    document.querySelectorAll('.stat').forEach(stat => {
        let target = +stat.getAttribute('data-target');
        let count = 0;
        let increment = target/50;
        let interval = setInterval(()=>{
            count+=increment;
            if(count>=target){ stat.textContent=target; clearInterval(interval); }
            else stat.textContent=Math.floor(count);
        },20);
    });
}

// Logout
async function logout(){
    await supabase.auth.signOut();
    window.location.href="login.html";
}
document.getElementById("logoutBtn").addEventListener("click", logout);
document.getElementById("logoutSidebar").addEventListener("click", logout);

// Toggle Service Provider
document.getElementById("service-provider-toggle").addEventListener("change", async (e)=>{
    const { data: { session } } = await supabase.auth.getSession();
    if(!session) return;
    const userId = session.user.id;
    const showInDirectory = e.target.checked;

    const { error } = await supabase.from("profiles")
        .update({ show_in_directory: showInDirectory })
        .eq("id", userId);

    if(error){
        alert("Failed to update listing status: " + error.message);
    } else {
        console.log("Listing status updated:", showInDirectory);
    }
});

supabase.auth.onAuthStateChange((event, session)=>{
    if(!session) window.location.href="login.html";
});

loadDashboard();
</script>
</body>
</html>
