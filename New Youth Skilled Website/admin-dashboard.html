<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Youth Skilled - Admin Support Dashboard</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
<style>
:root {
    --bg-dark: #0f2027;
    --bg-dark2: #203a43;
    --primary: linear-gradient(90deg,#00f5ff,#00ff88);
    --accent: #00ff88;
    --card-bg: rgba(255,255,255,0.05);
    --light-bg: rgba(255,255,255,0.1);
    --border-radius: 10px;
}

*{box-sizing:border-box;}

body{
    margin:0;
    font-family:'Poppins',sans-serif;
    background:var(--bg-dark);
    color:white;
}

/* NAVBAR */
nav{
    position:sticky;
    top:0;
    left:0;
    width:100%;
    display:flex;
    justify-content:space-between;
    align-items:center;
    padding:15px 5%;
    background:rgba(15,32,39,0.95);
    backdrop-filter:blur(12px);
    border-bottom:1px solid rgba(255,255,255,0.1);
    z-index:9999;
    box-shadow:0 2px 20px rgba(0,0,0,0.4);
}

.logo{
    font-size:22px;
    font-weight:700;
    background:var(--primary);
    -webkit-background-clip:text;
    color:transparent;
}

.nav-links{
    display:flex;
    gap:25px;
    flex-wrap:wrap;
}

.nav-links a{
    text-decoration:none;
    color:white;
    font-weight:500;
    transition:0.3s;
}

.nav-links a:hover{
    transform:translateY(-2px);
    text-shadow:0 0 10px #00ff88,0 0 15px #00f5ff;
}

/* DASHBOARD CONTENT */
.container{
    padding:40px;
}

h1{
    background:var(--primary);
    -webkit-background-clip:text;
    color:transparent;
}

.message-card{
    background:var(--card-bg);
    border-radius:var(--border-radius);
    padding:15px;
    margin-bottom:15px;
    box-shadow:0 4px 15px rgba(0,0,0,0.2);
}

.message-card .user{
    font-weight:600;
    margin-bottom:5px;
}

.message-card .msg{
    color:#bbb;
}

.message-card .time{
    font-size:12px;
    opacity:0.7;
    text-align:right;
}

.reply-box{
    margin-top:10px;
    display:flex;
    gap:10px;
}

.reply-box input{
    flex:1;
    padding:8px;
    border-radius:5px;
    border:none;
    outline:none;
}

.reply-box button{
    padding:8px 12px;
    border:none;
    border-radius:5px;
    background:var(--accent);
    color:black;
    cursor:pointer;
    transition:0.3s;
}

.reply-box button:hover{
    background:var(--primary);
    transform:scale(1.05);
}

</style>
</head>
<body>

<nav>
<div class="logo">Youth Skilled Admin</div>
<div class="nav-links">
<a href="dashboard.html">Main Site</a>
<a href="#" id="logoutBtn">Logout</a>
</div>
</nav>

<div class="container">
<h1>Support Messages</h1>
<div id="messagesContainer">
    <!-- Messages will appear here -->
</div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
// --- SUPABASE SETUP ---
const supabaseUrl = "https://fwvuvfiqaxmtpyxmwiih.supabase.co";
const supabaseKey = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImZ3dnV2ZmlxYXhtdHB5eG13aWloIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzMzMTMwOTMsImV4cCI6MjA4ODg4OTA5M30.jYOdMzA2UL6ifNUMhleJq6yfL4CNTehkR-dDjnMwf0Y";
const supabase = window.supabase.createClient(supabaseUrl, supabaseKey);

// --- ADMIN CHECK ---
async function checkAdmin() {
    const { data: { session } } = await supabase.auth.getSession();
    if (!session || session.user.role !== 'admin') {
        alert("Access denied. Admins only.");
        window.location.href = "/login.html";
        return false;
    }
    return session.user.id;
}

// --- LOAD MESSAGES ---
async function loadMessages() {
    const adminId = await checkAdmin();
    if (!adminId) return;

    const { data, error } = await supabase
        .from('support_messages')
        .select('id, user_id, message, created_at, users(username)')
        .order('created_at', { ascending: false })
        .limit(50);

    if (error) {
        console.error(error);
        alert("Failed to load messages");
        return;
    }

    const container = document.getElementById('messagesContainer');
    container.innerHTML = '';

    data.forEach(msg => {
        const div = document.createElement('div');
        div.classList.add('message-card');

        const userDiv = document.createElement('div');
        userDiv.classList.add('user');
        userDiv.textContent = msg.users?.username || msg.user_id;

        const msgDiv = document.createElement('div');
        msgDiv.classList.add('msg');
        msgDiv.textContent = msg.message;

        const timeDiv = document.createElement('div');
        timeDiv.classList.add('time');
        timeDiv.textContent = new Date(msg.created_at).toLocaleString();

        div.appendChild(userDiv);
        div.appendChild(msgDiv);
        div.appendChild(timeDiv);

        // Optional: Reply box
        const replyBox = document.createElement('div');
        replyBox.classList.add('reply-box');

        const input = document.createElement('input');
        input.placeholder = "Reply to this message";

        const button = document.createElement('button');
        button.textContent = "Send";
        button.onclick = async () => {
            const reply = input.value.trim();
            if (!reply) return;
            const { error } = await supabase
                .from('support_replies')
                .insert([{ message_id: msg.id, admin_id: adminId, reply }]);
            if (error) {
                alert("Failed to send reply");
            } else {
                alert("Reply sent!");
                input.value = "";
            }
        }

        replyBox.appendChild(input);
        replyBox.appendChild(button);
        div.appendChild(replyBox);

        container.appendChild(div);
    });
}

loadMessages();

// --- LOGOUT ---
document.getElementById('logoutBtn').addEventListener('click', async () => {
    await supabase.auth.signOut();
    window.location.href = "/login.html";
});
</script>

</body>
</html>
