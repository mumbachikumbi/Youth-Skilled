<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Youth Skilled - Self Listing</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
<style>
:root{
    --bg-dark:#0f2027;
    --bg-dark2:#203a43;
    --bg-dark3:#2c5364;
    --primary:linear-gradient(90deg,#00f5ff,#00ff88);
    --highlight-color:#00ff88;
}
*{box-sizing:border-box;}
body{
    margin:0;
    font-family:'Poppins',sans-serif;
    background:linear-gradient(135deg,var(--bg-dark),var(--bg-dark2),var(--bg-dark3));
    color:white;
    overflow-x:hidden;
}
nav{
    display:flex;
    justify-content:space-between;
    align-items:center;
    padding:20px 8%;
    position:fixed;
    width:100%;
    backdrop-filter:blur(10px);
    background:rgba(255,255,255,0.05);
    border-bottom:1px solid rgba(255,255,255,0.1);
    z-index:1000;
}
.logo{
    font-size:22px;
    font-weight:700;
    background:var(--primary);
    -webkit-background-clip:text;
    color:transparent;
}
.nav-links{
    display:flex;
    gap:25px;
}
.nav-links a{
    text-decoration:none;
    color:white;
    font-weight:500;
    white-space:nowrap;
}
.nav-links a:hover{
    transform: translateY(-3px);
    color: var(--highlight-color);
    text-shadow: 0 0 10px var(--highlight-color),0 0 15px #00f5ff;
}
.hero{
    height:35vh;
    display:flex;
    justify-content:center;
    align-items:center;
    text-align:center;
    padding:0 10%;
    padding-top:80px;
}
.hero h1{
    font-size:36px;
    background:var(--primary);
    -webkit-background-clip:text;
    color:transparent;
}
.hero p{
    margin-top:15px;
    font-size:16px;
    opacity:0.85;
}
form{
    max-width:500px;
    margin:20px auto 60px auto;
    padding:30px;
    background: rgba(255,255,255,0.05);
    border-radius:15px;
    backdrop-filter: blur(10px);
    border:1px solid rgba(255,255,255,0.1);
    display:flex;
    flex-direction:column;
    gap:15px;
}
input, select{
    padding:10px 15px;
    border-radius:10px;
    border:none;
    font-family:'Poppins',sans-serif;
}
input:focus, select:focus{
    outline:none;
    box-shadow:0 0 10px #00f5ff;
}
.btn{
    background: var(--primary);
    border:none;
    color:white;
    font-weight:600;
    padding:12px 25px;
    border-radius:20px;
    cursor:pointer;
}
.btn:hover{
    background:#00ff88;
    box-shadow:0 0 10px #00f5ff;
}
#form-msg{
    text-align:center;
    font-size:15px;
    margin-top:10px;
}
footer{
    text-align:center;
    padding:40px 10%;
    background:rgba(0,0,0,0.3);
    border-top:1px solid rgba(255,255,255,0.1);
}
footer .footer-content{
    display:flex;
    flex-direction:column;
    align-items:center;
    gap:10px;
}
footer .social-icons{
    display:flex;
    gap:20px;
}
footer .social-icons a{
    color:white;
    font-size:20px;
    transition:all 0.3s ease;
}
footer .social-icons a:hover{
    color:var(--highlight-color);
    transform:translateY(-3px);
    text-shadow:0 0 10px var(--highlight-color),0 0 15px #00f5ff;
}
@media(max-width:768px){
    .hero h1{font-size:28px;}
}
</style>
</head>
<body>

<nav>
    <div class="logo">Youth Skilled</div>
    <div class="nav-links">
        <a href="index.html">Home</a>
        <a href="skills.html">Skills</a>
        <a href="#contact">Contact</a>
    </div>
</nav>

<div class="hero">
    <div>
        <h1>List Your Skills</h1>
        <p>Showcase your talent and get discovered by clients.</p>
    </div>
</div>

<form id="list-service-form">
    <input type="text" id="name" placeholder="Your Name" required>
    <input type="text" id="gender" placeholder="Gender">
    <input type="number" id="age" placeholder="Age">
    <input type="text" id="location" placeholder="City">
    <input type="text" id="experience" placeholder="Experience (e.g., 3 yrs)">
    <select id="skill" required>
        <option value="">Select Skill</option>
        <option value="Graphic Design">Graphic Design</option>
        <option value="CV Writing">CV Writing</option>
        <option value="Plumbing">Plumbing</option>
        <option value="Solar Installation">Solar Installation</option>
        <option value="Virtual Assistance">Virtual Assistance</option>
        <option value="House Painting">House Painting</option>
        <option value="Social Media Management">Social Media Management</option>
        <option value="Data Entry">Data Entry</option>
        <option value="Electrical Work">Electrical Work</option>
        <option value="Carpentry">Carpentry</option>
        <option value="Green Solutions">Green Solutions</option>
        <option value="Baking">Baking</option>
        <option value="Salon Services">Salon Services</option>
        <option value="Tailoring">Tailoring</option>
        <option value="Tutoring">Tutoring</option>
    </select>
    <button type="submit" class="btn">Submit</button>
    <p id="form-msg"></p>
</form>

<footer id="contact">
  <div class="footer-content">
    © 2026 Youth Skilled. All Rights Reserved.
    <div class="social-icons">
      <a href="https://facebook.com" target="_blank"><i class="fab fa-facebook-f"></i></a>
      <a href="https://twitter.com" target="_blank"><i class="fab fa-twitter"></i></a>
      <a href="https://linkedin.com" target="_blank"><i class="fab fa-linkedin-in"></i></a>
    </div>
  </div>
</footer>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
const supabaseUrl = "https://fwvuvfiqaxmtpyxmwiih.supabase.co"; // replace
const supabaseKey = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImZ3dnV2ZmlxYXhtdHB5eG13aWloIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzMzMTMwOTMsImV4cCI6MjA4ODg4OTA5M30.jYOdMzA2UL6ifNUMhleJq6yfL4CNTehkR-dDjnMwf0Y"; // replace
const supabase = supabase.createClient(supabaseUrl, supabaseKey);

document.getElementById("list-service-form").addEventListener("submit", async (e) => {
    e.preventDefault();

    const name = document.getElementById("name").value;
    const gender = document.getElementById("gender").value;
    const age = parseInt(document.getElementById("age").value);
    const location = document.getElementById("location").value;
    const experience = document.getElementById("experience").value;
    const skill = document.getElementById("skill").value;

    const { data, error } = await supabase
        .from('providers')
        .insert([{
            name,
            gender,
            age: isNaN(age)? null : age,
            location,
            experience,
            skill,
            verified: false,
            rating: 0,
            show_in_directory: true
        }]);

    const msg = document.getElementById("form-msg");
    if(error){
        msg.innerText = "Error submitting: " + error.message;
        msg.style.color = "red";
    } else {
        msg.innerText = "Successfully listed! Your profile will appear under " + skill;
        msg.style.color = "#00ff88";
        e.target.reset();
    }
});
</script>

</body>
</html>
